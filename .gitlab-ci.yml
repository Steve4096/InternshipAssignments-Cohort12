image: maven:3.9.2-openjdk-17

stages:
  - build
  - test
  - package
  - artifact

# Build Stage
build:
  stage: build
  script:
    - mvn clean compile
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH == "main"'

# Test Stage
test:
  stage: test
  script:
    - mvn test
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH == "main"'

# Package Stage
package:
  stage: package
  script:
    - mvn package
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH == "main"'

# Artifact Stage
artifact:
  stage: artifact
  script:
    - echo "Saving artifacts..."
  artifacts:
    paths:
      - target/*.jar
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH == "main"'