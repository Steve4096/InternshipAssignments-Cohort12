image: maven:3.9.2-openjdk-21

stages:
  - build
  - test
  - package
  - artifact

# Build Stage
build:
  stage: build
  script:
    - cd InternshipAssignments-Cohort12   # if pom.xml is in a subfolder
    - mvn clean compile
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'

# Test Stage
test:
  stage: test
  script:
    - cd InternshipAssignments-Cohort12
    - mvn test
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'

# Package Stage
package:
  stage: package
  script:
    - cd InternshipAssignments-Cohort12
    - mvn package
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'

# Artifact Stage
artifact:
  stage: artifact
  script:
    - cd InternshipAssignments-Cohort12
    - echo "Saving artifacts..."
  artifacts:
    paths:
      - InternshipAssignments-Cohort12/target/*.jar
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'
    - if: '$CI_COMMIT_BRANCH == "main"'