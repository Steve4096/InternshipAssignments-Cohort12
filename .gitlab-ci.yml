# Use Java 21 via Eclipse Temurin
image: eclipse-temurin:21-jdk

stages:
  - build
  - test
  - package
  - artifact

# 1️⃣ Build Stage
build:
  stage: build
  script:
    - echo "Building project..."
    - mvn clean compile
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'   # run on pushes to develop

# 2️⃣ Test Stage
test:
  stage: test
  script:
    - echo "Running tests..."
    - mvn test
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'   # run on pushes to develop

# 3️⃣ Package Stage
package:
  stage: package
  script:
    - echo "Packaging project..."
    - mvn package
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'   # run on pushes to develop

# 4️⃣ Artifact Stage
artifact:
  stage: artifact
  script:
    - echo "Saving artifact..."
  artifacts:
    paths:
      - target/*.jar
    expire_in: 1 week
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'   # store artifacts on develop pushes
    - if: '$CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"'  # store artifact on main merges