# Use Eclipse Temurin 21 (Java 21) Docker image
image: eclipse-temurin:21-jdk

stages:
  - build
  - test
  - package
  - artifact

before_script:
  # Install Maven
  - apt-get update -qq
  - apt-get install -y maven
  - mvn -version

# 1️⃣ Build Stage
build:
  stage: build
  script:
    - echo "Building project..."
    - mvn clean compile
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'

# 2️⃣ Test Stage
test:
  stage: test
  script:
    - echo "Running tests..."
    - mvn test
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'

# 3️⃣ Package Stage
package:
  stage: package
  script:
    - echo "Packaging project..."
    - mvn package
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'

# 4️⃣ Artifact Stage
artifact:
  stage: artifact
  script:
    - echo "Saving artifact..."
  artifacts:
    paths:
      - target/*.jar
    expire_in: 1 week
  rules:
    # Run this stage on merge requests targeting main OR on main pushes
    - if: '$CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"'
    - if: '$CI_COMMIT_BRANCH == "main"'